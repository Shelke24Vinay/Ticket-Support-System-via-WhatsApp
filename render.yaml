# Render Blueprint Specification
# See https://render.com/docs/blueprints for details

databases:
  - name: ticket-db
    databaseName: ticket_support_db
    user: db_user
    plan: free

services:
  - type: web
    name: ticket-support-system
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ticket-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: PYTHON_VERSION
        value: 3.11.9
